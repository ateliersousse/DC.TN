<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoDiagnostic Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">
            <span>AutoDiagnostic <span class="pro">Pro</span></span>
        </div>
        <nav>
            <a href="#" id="btnLogout" style="display:none;">🚪 Déconnexion</a>
        </nav>
    </header>

    <!-- ===== PAGE DE CONNEXION ===== -->
    <section id="authSection" class="auth-section">
        <div class="auth-card">
            <h2>🔐 Connexion</h2>
            
            <!-- Formulaire de connexion -->
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="E-mail" required />
                <input type="password" id="loginPassword" placeholder="Mot de passe" />
                <button type="submit">🔓 Se connecter</button>
            </form>

            <!-- ===== ADMIN SECTION ===== -->
            <div id="adminSection" style="display:none; margin-top:15px; padding:15px; background:#f0f6fe; border-radius:15px;">
                <h4 style="color:#0077b6;">⭐ Admin</h4>
                <p>Code : <strong id="adminCodeDisplay">123456</strong></p>
                <input type="text" id="adminCodeInput" placeholder="Entrez le code" maxlength="6" style="width:100%; padding:10px; margin:10px 0; border-radius:30px; border:2px solid #0077b6;" />
                <button onclick="verifyAdmin()" style="width:100%; padding:12px; background:#0077b6; color:white; border:none; border-radius:30px; font-weight:bold; cursor:pointer;">✅ Vérifier</button>
            </div>

            <p id="message" style="margin-top:15px; font-size:14px; min-height:24px;"></p>
        </div>
    </section>

    <!-- ===== TABLEAU DE BORD ===== -->
    <section id="dashboard" style="display:none;">
        <div class="welcome-banner">
            <h1>🚗 AutoDiagnostic Pro</h1>
            <p>Bienvenue <span id="userName">Admin</span> ⭐</p>
        </div>

        <div class="search-box">
            <input type="text" id="carModel" placeholder="Modèle" />
            <select id="carBrand">
                <option value="volkswagen">Volkswagen</option>
                <option value="bmw">BMW</option>
                <option value="mercedes">Mercedes</option>
                <option value="toyota">Toyota</option>
            </select>
            <select id="carYear">
                <option value="2020">2020</option>
                <option value="2021">2021</option>
                <option value="2022">2022</option>
            </select>
            <button onclick="runDiagnostic()">🔍 Lancer</button>
        </div>

        <div id="result" class="result" style="display:none;">
            <h2 id="carTitle"></h2>
            <ul id="defectList"></ul>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
